services:
  livekit:
    image: livekit/livekit-server:v1.8.3
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro

  auth:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/virtual-table-auth:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AUTH_BIND_ADDR: ${AUTH_BIND_ADDR:-0.0.0.0:8787}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      JOIN_SECRET: ${JOIN_SECRET:-}
      ALLOWED_ROOMS: ${ALLOWED_ROOMS:-dnd-table-1}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS}

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/virtual-table-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL}
      NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL}
      NEXT_PUBLIC_DEFAULT_ROOM: ${NEXT_PUBLIC_DEFAULT_ROOM:-dnd-table-1}

  caddy:
    image: caddy:2.8.4
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - auth

volumes:
  caddy_data:
  caddy_config:
