name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend_infra_checks:
    name: frontend_infra_checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 10.30.3

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: pnpm

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare infrastructure env
        run: cp infrastructure/.env.example infrastructure/.env

      - name: Frontend lint
        run: pnpm --filter frontend lint

      - name: Frontend typecheck
        run: pnpm --filter frontend typecheck

      - name: Frontend test
        run: pnpm --filter frontend test

      - name: Frontend build
        run: pnpm --filter frontend build

      - name: Infrastructure lint
        run: pnpm --filter infrastructure lint

      - name: Infrastructure test
        run: pnpm --filter infrastructure test

  backend_checks:
    name: backend_checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        run: cargo fmt --manifest-path backend/Cargo.toml -- --check

      - name: Cargo clippy
        run: cargo clippy --manifest-path backend/Cargo.toml --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --manifest-path backend/Cargo.toml

      - name: Cargo build
        run: cargo build --manifest-path backend/Cargo.toml --locked

  security_js:
    name: security_js
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 10.30.3

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: pnpm

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (high and critical)
        run: pnpm audit --audit-level high

      - name: Dependency review (pull requests only; non-blocking)
        if: ${{ github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: actions/dependency-review-action@05fe4576374b728f0c523d6a13d64c25081e0803
        with:
          fail-on-severity: high

  security_rust:
    name: security_rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7

      - name: Install cargo-audit
        uses: taiki-e/install-action@d0c60d3908965d16ed7e5fb38682d4659f0a6584

      - name: Cargo audit
        run: cargo audit --file backend/Cargo.lock

  merge-gate:
    name: merge-gate
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - frontend_infra_checks
      - backend_checks
      - security_js
      - security_rust
    steps:
      - name: Validate upstream job status
        env:
          FRONTEND_INFRA_RESULT: ${{ needs.frontend_infra_checks.result }}
          BACKEND_RESULT: ${{ needs.backend_checks.result }}
          SECURITY_JS_RESULT: ${{ needs.security_js.result }}
          SECURITY_RUST_RESULT: ${{ needs.security_rust.result }}
        run: |
          test "$FRONTEND_INFRA_RESULT" = "success"
          test "$BACKEND_RESULT" = "success"
          test "$SECURITY_JS_RESULT" = "success"
          test "$SECURITY_RUST_RESULT" = "success"
