name: Dependabot Auto Merge

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  checks: read
  contents: write
  pull-requests: write

jobs:
  merge:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Approve and merge eligible Dependabot PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          if [ -z "${PR_NUMBER:-}" ]; then
            echo "No pull request is associated with this CI run."
            exit 0
          fi

          pr_json="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}")"
          author="$(echo "$pr_json" | jq -r '.user.login')"
          state="$(echo "$pr_json" | jq -r '.state')"
          draft="$(echo "$pr_json" | jq -r '.draft')"
          head_sha="$(echo "$pr_json" | jq -r '.head.sha')"

          if [ "$author" != "dependabot[bot]" ]; then
            echo "PR #${PR_NUMBER} is not authored by Dependabot."
            exit 0
          fi

          if [ "$state" != "open" ] || [ "$draft" != "false" ]; then
            echo "PR #${PR_NUMBER} is not open and ready to merge."
            exit 0
          fi

          if [ "$head_sha" != "$WORKFLOW_HEAD_SHA" ]; then
            echo "Skipping stale CI run for PR #${PR_NUMBER}."
            exit 0
          fi

          merge_gate_conclusion="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/commits/${head_sha}/check-runs?per_page=100" \
              --jq '[.check_runs[] | select(.name == "merge-gate")] | sort_by(.started_at // .completed_at) | last | .conclusion // ""'
          )"

          if [ "$merge_gate_conclusion" != "success" ]; then
            echo "merge-gate has not succeeded for PR #${PR_NUMBER} (conclusion=${merge_gate_conclusion:-missing})."
            exit 0
          fi

          reviews_json="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews?per_page=100")"
          approval_for_head="$(
            echo "$reviews_json" | jq -r --arg head_sha "$head_sha" '
              any(
                .[];
                .user.login == "github-actions[bot]" and
                .state == "APPROVED" and
                .commit_id == $head_sha
              )
            '
          )"

          if [ "$approval_for_head" != "true" ]; then
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
              -f event="APPROVE" \
              -f body="Auto-approving Dependabot update so it can merge once required checks pass."
          fi

          attempts=0
          mergeable="null"

          while [ "$attempts" -lt 6 ]; do
            mergeable="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.mergeable')"

            if [ "$mergeable" != "null" ]; then
              break
            fi

            attempts=$((attempts + 1))
            sleep 5
          done

          if [ "$mergeable" != "true" ]; then
            echo "PR #${PR_NUMBER} is not mergeable (mergeable=${mergeable})."
            exit 0
          fi

          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "repos/${REPO}/pulls/${PR_NUMBER}/merge" \
            -f sha="$head_sha" \
            -f merge_method="squash"
