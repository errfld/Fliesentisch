name: Dependabot Auto Merge

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  enable:
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Auto-approve Dependabot PR
        if: ${{ !github.event.pull_request.draft }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          reviews_json="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews?per_page=100")"
          approval_for_head="$(
            echo "$reviews_json" | jq -r --arg head_sha "$HEAD_SHA" '
              any(
                .[];
                .user.login == "github-actions[bot]" and
                .state == "APPROVED" and
                .commit_id == $head_sha
              )
            '
          )"

          if [ "$approval_for_head" != "true" ]; then
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
              -f event="APPROVE" \
              -f body="Auto-approving Dependabot update so it can merge once required checks pass."
          fi

      - name: Enable auto-merge once required checks succeed
        if: ${{ !github.event.pull_request.draft }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail

          auto_merge_enabled="$(
            gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.auto_merge != null'
          )"

          if [ "$auto_merge_enabled" = "true" ]; then
            echo "Auto-merge is already enabled for PR #${PR_NUMBER}."
            exit 0
          fi

          gh pr merge --auto --squash "$PR_URL"
