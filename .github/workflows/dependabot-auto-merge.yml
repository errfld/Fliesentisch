name: Dependabot Auto Merge

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Merge eligible Dependabot PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          if [ -z "${PR_NUMBER}" ]; then
            echo "No pull request is associated with this CI run."
            exit 0
          fi

          attempts=0
          pr_json=""

          while [ "$attempts" -lt 6 ]; do
            pr_json="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}")"
            mergeable="$(echo "$pr_json" | jq -r '.mergeable')"

            if [ "$mergeable" != "null" ]; then
              break
            fi

            attempts=$((attempts + 1))
            sleep 5
          done

          author="$(echo "$pr_json" | jq -r '.user.login')"
          state="$(echo "$pr_json" | jq -r '.state')"
          draft="$(echo "$pr_json" | jq -r '.draft')"
          head_sha="$(echo "$pr_json" | jq -r '.head.sha')"
          mergeable="$(echo "$pr_json" | jq -r '.mergeable')"

          if [ "$author" != "dependabot[bot]" ]; then
            echo "PR #${PR_NUMBER} is not authored by Dependabot."
            exit 0
          fi

          if [ "$state" != "open" ] || [ "$draft" != "false" ]; then
            echo "PR #${PR_NUMBER} is not mergeable because it is not open and ready."
            exit 0
          fi

          if [ "$head_sha" != "$WORKFLOW_HEAD_SHA" ]; then
            echo "Skipping stale CI run for PR #${PR_NUMBER}."
            exit 0
          fi

          if [ "$mergeable" != "true" ]; then
            echo "PR #${PR_NUMBER} has conflicts or GitHub still cannot determine mergeability."
            exit 0
          fi

          reviews_json="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews?per_page=100")"
          approval_for_head="$(
            echo "$reviews_json" | jq -r --arg head_sha "$head_sha" '
              any(
                .[];
                .user.login == "github-actions[bot]" and
                .state == "APPROVED" and
                .commit_id == $head_sha
              )
            '
          )"

          if [ "$approval_for_head" != "true" ]; then
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
              -f event="APPROVE" \
              -f body="Auto-approving Dependabot update after CI passed."
          fi

          attempts=0

          while [ "$attempts" -lt 6 ]; do
            pr_json="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}")"
            mergeable_state="$(echo "$pr_json" | jq -r '.mergeable_state')"

            case "$mergeable_state" in
              clean|unstable|has_hooks)
                break
                ;;
            esac

            attempts=$((attempts + 1))
            sleep 5
          done

          mergeable_state="$(echo "$pr_json" | jq -r '.mergeable_state')"

          case "$mergeable_state" in
            clean|unstable|has_hooks)
              ;;
            *)
              echo "PR #${PR_NUMBER} is not ready to merge (mergeable_state=${mergeable_state})."
              exit 0
              ;;
          esac

          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "repos/${REPO}/pulls/${PR_NUMBER}/merge" \
            -f sha="$head_sha" \
            -f merge_method="squash"
