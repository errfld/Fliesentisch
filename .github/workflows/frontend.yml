name: Frontend CI

on:
  pull_request:
    paths:
      - "frontend/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/frontend.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/frontend.yml"

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm --filter frontend lint

      - name: Typecheck
        run: pnpm --filter frontend typecheck

      - name: Test
        run: pnpm --filter frontend test

      - name: Build
        run: pnpm --filter frontend build

      - name: Build frontend image
        run: docker build -t virtual-table-frontend:test -f frontend/Dockerfile frontend
